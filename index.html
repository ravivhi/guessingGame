    <style>
        :root {
            --primary: #4a00e0;
            --secondary: #8e2de2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--dark);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 { margin-top: 0; color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: #7f8c8d; margin-bottom: 25px; font-size: 0.95rem; }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--dark);
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background-color: var(--light);
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: var(--primary);
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .timer { color: #f39c12; }
        .timer.time-up { 
            color: var(--danger); 
            animation: blink 1s linear infinite;
        }
        .score { color: var(--success); }
        .player-tag { color: var(--primary); }

        @keyframes blink { 50% { opacity: 0; } }

        .card {
            background: var(--light);
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.4rem;
            font-weight: bold;
            margin-bottom: 30px;
            padding: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
            margin: 5px;
        }

        .btn:active { transform: scale(0.95); }
        .btn-start { background-color: var(--primary); color: white; width: 100%; font-size: 1.3rem; }
        .btn-success { background-color: var(--success); color: white; flex: 1; }
        .btn-danger { background-color: var(--danger); color: white; flex: 1; }
        .btn-restart { background-color: var(--dark); color: white; width: 100%; }
        .btn-reset-all { background-color: #7f8c8d; color: white; font-size: 0.8rem; padding: 6px; margin-top: 20px; width: 100%; }
        .btn-names { background-color: #2980b9; color: white; font-size: 0.85rem; padding: 8px; margin-top: 8px; width: 100%; }
        .player-count-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 10px 0 20px; }
        .count-btn { padding: 10px 16px; border-radius: 10px; border: 2px solid #e0e0e0; background: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all .15s; min-width: 48px; }
        .count-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .setup-names-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .setup-name-wrap { display: flex; flex-direction: column; gap: 3px; }
        .setup-name-wrap label { font-size: 0.78rem; color: #7f8c8d; font-weight: bold; }
        .setup-name-wrap input { padding: 9px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; width: 100%; }
        .setup-name-wrap input:focus { border-color: var(--primary); outline: none; }
        .btn-start-tournament { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; width: 100%; font-size: 1.2rem; margin-top: 12px; padding: 16px; }
        .names-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; text-align: right; }
        .name-input-wrap { display: flex; flex-direction: column; gap: 4px; }
        .name-input-wrap label { font-size: 0.8rem; color: #7f8c8d; font-weight: bold; }
        .name-input-wrap input { padding: 8px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; width: 100%; }
        .name-input-wrap input:focus { border-color: var(--primary); outline: none; }
        .btn-save-names { background-color: var(--success); color: white; width: 100%; font-size: 1.1rem; margin-top: 10px; }
        .btn-back-from-names { background-color: #95a5a6; color: white; width: 100%; font-size: 0.9rem; margin-top: 6px; }
        .scoreboard { display: none; }
        .player-grid { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
        .player-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
        }
        .player-card:active { transform: scale(0.98); }
        .player-card:hover { border-color: var(--primary); background: #f0ebff; }
        .player-card.active-player {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(74,0,224,0.35);
        }
        .player-card-name { font-size: 1rem; font-weight: bold; flex: 1; text-align: right; }
        .player-card-score { font-size: 1.3rem; font-weight: bold; }
        .player-card.active-player .player-card-score { color: #ffe066; }
        .player-card:not(.active-player) .player-card-score { color: var(--primary); }
        .player-card-label { font-size: 0.7rem; opacity: 0.7; }
        .player-card-stats { display: flex; gap: 8px; font-size: 0.72rem; opacity: 0.9; flex-wrap: wrap; }

        .controls { display: flex; gap: 15px; }
        .hidden { display: none !important; }

        .summary-list {
            text-align: right;
            max-height: 180px;
            overflow-y: auto;
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }

        .status-v { color: var(--success); font-weight: bold; }
        .status-x { color: var(--danger); font-weight: bold; }
        
        .info-box {
            background-color: #fcf8e3;
            border: 1px solid #fbeed5;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #c09853;
            margin-bottom: 15px;
            text-align: right;
        }

        * { box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .card { word-break: break-word; line-height: 1.2; }

        @media (max-width: 480px) {
            body { align-items: flex-start; }
            .game-container { padding: 18px; border-radius: 16px; width: 94%; margin: 12px 0; }
            h1 { font-size: 1.6rem; }
            .subtitle { font-size: 0.85rem; margin-bottom: 18px; }
            .card { font-size: 2rem; height: 130px; }
            .stats-container { font-size: 1rem; gap: 6px; flex-wrap: wrap; }
            .btn { padding: 14px 18px; font-size: 1.05rem; }
            .btn-start { font-size: 1.15rem; }
            .controls { gap: 10px; }
            select { font-size: 1.05rem; }
            .summary-list { max-height: 150px; }
        }
    </style>
</head>

    <div class="game-container">
        <h1>משחק הניחושים</h1>

        <!-- מסך הגדרה ראשוני -->
        <div id="setup-screen" class="hidden">
            <h3 style="margin-top:0;color:var(--primary);">⚙️ הגדרת טורניר חדש</h3>

            <div class="form-group">
                <label>כמה שחקנים?</label>
                <div class="player-count-btns" id="count-btns">
                </div>
            </div>

            <div class="form-group">
                <label>שמות שחקנים:</label>
                <div class="setup-names-grid" id="setup-names-grid"></div>
            </div>

            <button class="btn btn-start-tournament" onclick="startTournament()">🎮 התחל טורניר!</button>
        </div>

        <!-- מסך ראשי -->
        <div id="start-screen">
            <p style="margin:0 0 8px;font-weight:bold;color:#7f8c8d;font-size:0.9rem;">בחר שחקן ולחץ להתחיל תור:</p>
            <div class="player-grid" id="player-grid"></div>
            <!-- hidden select for JS compat -->
            <select id="player-select" onchange="loadPlayerStats()" style="display:none"></select>
            <div id="player-info-box" style="display:none"></div>
            <div class="scoreboard" id="scoreboard"></div>
            <button class="btn btn-start" id="start-btn" onclick="startGame()" style="margin-top:8px;">▶️ התחל תור</button>

            <button class="btn btn-reset-all" onclick="resetAllData()">איפוס מוחלט</button>
        </div>

        <!-- מסך עריכת שמות -->
        <div id="names-screen" class="hidden">
            <h3 style="margin-top:0;color:var(--primary);">✏️ שמות שחקנים</h3>
            <div class="names-grid" id="names-grid"></div>
            <button class="btn btn-save-names" onclick="saveNames()">✅ שמור שמות</button>
            <button class="btn btn-back-from-names" onclick="closeNamesScreen()">חזרה</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="stats-container">
                <div><span id="game-current-player" class="player-tag"></span></div>
                <div id="timer-box">זמן: <span id="timer" class="timer">60</span></div>
                <div>נקודות: <span id="score" class="score">0</span></div>
            </div>
            <div class="card" id="word-card">...</div>
            <div class="controls">
                <button class="btn btn-danger" onclick="handleAnswer(false)">פספוס</button>
                <button class="btn btn-success" onclick="handleAnswer(true)">הצלחתי</button>
            </div>
        </div>

        <div id="summary-screen" class="hidden">
            <h2>סוף הסיבוב!</h2>
            <div class="stats-container" style="flex-direction: column; gap: 8px;">
                <div>שחקן: <span id="summary-player-name" class="player-tag"></span></div>
                <div>נקודות שהושגו בסיבוב: <span id="round-score" class="score">0</span></div>
                <div>ניקוד כולל מצטבר: <span id="summary-total-score" style="color: #2980b9;">0</span></div>
            </div>
            
            <h3>מילים מהסיבוב האחרון:</h3>
            <div class="summary-list" id="summary-list"></div>
            
            <button class="btn btn-restart" onclick="backToMenu()">חזרה לתפריט הראשי 🔁</button>
        </div>
    </div>

        // הפעלה ראשונית של המשחק
        initTournament();

        function initTournament() {
            const DATA_VERSION = "v3-configurable";
            const savedData = localStorage.getItem('guessingTournamentData');
            const savedVersion = localStorage.getItem('guessingDataVersion');

            if (savedData && savedVersion === DATA_VERSION) {
                tournamentData = JSON.parse(savedData);
                showMainScreen();
            } else {
                // אין טורניר שמור — הצג מסך הגדרה
                showSetupScreen();
            }
        }

        function showSetupScreen(defaultCount) {
            // הסתר הכל, הצג setup
            ['start-screen','names-screen','game-screen','summary-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById('setup-screen').classList.remove('hidden');

            // כפתורי מספר שחקנים 2-10
            const countContainer = document.getElementById('count-btns');
            countContainer.innerHTML = '';
            const current = defaultCount || 4;
            for (let n = 2; n <= 10; n++) {
                const btn = document.createElement('button');
                btn.className = 'count-btn' + (n === current ? ' selected' : '');
                btn.textContent = n;
                btn.onclick = () => selectPlayerCount(n);
                countContainer.appendChild(btn);
            }
            renderSetupNames(current);
        }

        function selectPlayerCount(n) {
            document.querySelectorAll('.count-btn').forEach(b => {
                b.classList.toggle('selected', parseInt(b.textContent) === n);
            });
            renderSetupNames(n);
        }

        function getSelectedCount() {
            const sel = document.querySelector('.count-btn.selected');
            return sel ? parseInt(sel.textContent) : 4;
        }

        function renderSetupNames(n) {
            const grid = document.getElementById('setup-names-grid');
            grid.innerHTML = '';
            // שמור ערכים קיימים אם כבר הוקלדו
            const existing = {};
            document.querySelectorAll('[id^="setup-name-"]').forEach(el => {
                existing[el.id] = el.value;
            });
            for (let i = 1; i <= n; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'setup-name-wrap';
                const savedVal = existing[`setup-name-${i}`] || '';
                wrap.innerHTML = `<label>שחקן ${i}</label><input type="text" id="setup-name-${i}" value="${savedVal}" maxlength="15" placeholder="שחקן ${i}">`;
                grid.appendChild(wrap);
            }
        }

        function startTournament() {
            const n = getSelectedCount();
            const WORDS_PER_PLAYER = Math.floor(masterWordsBank.length / n);
            tournamentData = {};

            for (let i = 1; i <= n; i++) {
                const nameInput = document.getElementById(`setup-name-${i}`);
                const name = (nameInput && nameInput.value.trim()) || `שחקן ${i}`;
                const startIndex = (i - 1) * WORDS_PER_PLAYER;
                const fixedDeck = masterWordsBank.slice(startIndex, startIndex + WORDS_PER_PLAYER);
                const orderedForTournament = [...fixedDeck].sort(() => Math.random() - 0.5);
                tournamentData[`player${i}`] = {
                    name,
                    totalScore: 0,
                    roundsPlayed: 0,
                    wordPool: orderedForTournament,
                    playedWords: []
                };
            }

            localStorage.setItem('guessingDataVersion', 'v3-configurable');
            saveToStorage();
            activePlayerId = 'player1';
            showMainScreen();
        }

        function showMainScreen() {
            ['setup-screen','names-screen','game-screen','summary-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById('start-screen').classList.remove('hidden');

            const selectElem = document.getElementById('player-select');
            selectElem.innerHTML = '';
            const ids = Object.keys(tournamentData);
            ids.forEach(pid => {
                const opt = document.createElement('option');
                opt.value = pid;
                opt.innerText = tournamentData[pid].name;
                selectElem.appendChild(opt);
            });
            selectElem.disabled = false;
            if (tournamentData[activePlayerId]) {
                selectElem.value = activePlayerId;
            } else {
                activePlayerId = ids[0];
                selectElem.value = activePlayerId;
            }
            loadPlayerStats();
            renderScoreboard();
        }

        function openNamesScreen() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('names-screen').classList.remove('hidden');
            const grid = document.getElementById('names-grid');
            grid.innerHTML = '';
            Object.keys(tournamentData).forEach((pid, idx) => {
                const wrap = document.createElement('div');
                wrap.className = 'name-input-wrap';
                wrap.innerHTML = `<label>שחקן ${idx+1}</label><input type="text" id="name-input-${pid}" value="${tournamentData[pid].name}" maxlength="15" placeholder="שחקן ${idx+1}">`;
                grid.appendChild(wrap);
            });
        }

        function closeNamesScreen() {
            document.getElementById('names-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function saveNames() {
            Object.keys(tournamentData).forEach((pid, idx) => {
                const val = document.getElementById(`name-input-${pid}`).value.trim();
                tournamentData[pid].name = val || `שחקן ${idx+1}`;
            });
            saveToStorage();
            closeNamesScreen();
            showMainScreen();
        }

        function renderScoreboard() { renderPlayerGrid(); }

        function renderPlayerGrid() {
            const grid = document.getElementById('player-grid');
            if (!grid) return;
            const players = Object.entries(tournamentData);
            grid.innerHTML = players.map(([id, p]) => {
                const isActive = id === activePlayerId;
                const rounds = p.roundsPlayed || 0;
                const wordsLeft = p.wordPool ? p.wordPool.length : 0;
                return `
                <div class="player-card ${isActive ? 'active-player' : ''}" onclick="selectPlayer('${id}')">
                    <div class="player-card-name">${p.name}</div>
                    <div class="player-card-stats">
                        <span>🎯 ${rounds}</span>
                        <span>📝 ${wordsLeft}</span>
                    </div>
                    <div style="display:flex;flex-direction:column;align-items:center;min-width:48px;">
                        <div class="player-card-score">${p.totalScore}</div>
                        <div class="player-card-label">נקודות</div>
                    </div>
                </div>`;
            }).join('');
        }

        function selectPlayer(pid) {
            activePlayerId = pid;
            document.getElementById('player-select').value = pid;
            renderPlayerGrid();
            loadPlayerStats();
        }

        function loadPlayerStats() {
            activePlayerId = document.getElementById('player-select').value;
            const player = tournamentData[activePlayerId];
            
            // חישוב מילים שנותרו בקבוצה שלו
            const totalAssigned = player.wordPool.length + player.playedWords.length;
            const left = player.wordPool.length;

            const infoBox = document.getElementById('player-info-box');
            infoBox.innerHTML = `
                <strong>ניקוד מצטבר:</strong> ${player.totalScore} נקודות<br>
                <strong>מילים שנותרו בקופסה שלו:</strong> ${left} מתוך ${totalAssigned} מילים ייחודיות
            `;

            const startBtn = document.getElementById('start-btn');
            if (left === 0) {
                infoBox.innerHTML += `<br><strong style="color:red;">נגמרו המילים לשחקן זה!</strong>`;
                startBtn.disabled = true;
                startBtn.style.opacity = "0.5";
            } else {
                startBtn.disabled = false;
                startBtn.style.opacity = "1";
            }
        }

        function startGame() {
            const player = tournamentData[activePlayerId];
            if (player.wordPool.length === 0) return;

            // אתחול משתני סיבוב
            roundScoreChange = 0;
            timeLeft = 60;
            isTimeUp = false;
            playedInRoundHistory = [];
            currentWordIndex = 0;

            // המילים נשלפות בסדר שנקבע לטורניר הזה (כבר מעורבב מראש בעת יצירת הטורניר)
            currentRoundWords = [...player.wordPool];

            // עדכון הממשק
            document.getElementById('game-current-player').innerText = player.name;
            document.getElementById('score').innerText = roundScoreChange;
            document.getElementById('timer-box').innerHTML = 'זמן: <span id="timer" class="timer">60</span>';
            
            showNextWord();

            // מעבר מסך
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            // טיימר
            timerInterval = setInterval(() => {
                timeLeft--;
                const tElem = document.getElementById('timer');
                if (tElem) tElem.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeUp();
                }
            }, 1000);
        }

        function showNextWord() {
            if (currentWordIndex >= currentRoundWords.length) {
                document.getElementById('word-card').innerText = "אין יותר מילים!";
                handleTimeUp();
                return;
            }
            document.getElementById('word-card').innerText = currentRoundWords[currentWordIndex];
        }

        function handleTimeUp() {
            isTimeUp = true;
            endRound();
        }

        function handleAnswer(isCorrect) {
            if (currentWordIndex >= currentRoundWords.length) {
                endRound();
                return;
            }

            const activeWord = currentRoundWords[currentWordIndex];
            
            // רישום היסטוריה זמנית לסיבוב
            playedInRoundHistory.push({ word: activeWord, success: isCorrect });

            // הסרה קבועה של המילה מהפול הזמין של השחקן והעברה לרשימת המשומשים
            const player = tournamentData[activePlayerId];
            player.wordPool = player.wordPool.filter(w => w !== activeWord);
            player.playedWords.push(activeWord);

            // עדכון הניקוד המקומי של הסיבוב
            roundScoreChange += isCorrect ? 1 : -1;
            document.getElementById('score').innerText = roundScoreChange;

            // בדיקה אם לעצור או להמשיך
            if (isTimeUp || currentWordIndex + 1 >= currentRoundWords.length) {
                endRound();
            } else {
                currentWordIndex++;
                showNextWord();
            }
        }

        function endRound() {
            clearInterval(timerInterval);

            // הוספת הניקוד שהושג לניקוד הכללי המצטבר של השחקן
            const player = tournamentData[activePlayerId];
            player.totalScore += roundScoreChange;
            player.roundsPlayed = (player.roundsPlayed || 0) + 1;

            // שמירת המצב החדש ב-LocalStorage
            saveToStorage();

            // הכנת מסך סיכום
            document.getElementById('summary-player-name').innerText = player.name;
            document.getElementById('round-score').innerText = (roundScoreChange >= 0 ? '+' : '') + roundScoreChange;
            document.getElementById('summary-total-score').innerText = player.totalScore;

            const listElem = document.getElementById('summary-list');
            listElem.innerHTML = playedInRoundHistory.map(item => `
                <div class="summary-item">
                    <span>${item.word}</span>
                    <span class="${item.success ? 'status-v' : 'status-x'}">${item.success ? '✓' : '✗'}</span>
                </div>
            `).join('');

            // מעבר מסכים
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('summary-screen').classList.remove('hidden');
        }

        function backToMenu() {
            const ids = Object.keys(tournamentData);
            const currentIndex = ids.indexOf(activePlayerId);
            activePlayerId = ids[(currentIndex + 1) % ids.length];
            showMainScreen();
        }

        function saveToStorage() {
            localStorage.setItem('guessingTournamentData', JSON.stringify(tournamentData));
        }

        function resetAllData() {
            if (confirm("איפוס מוחלט? כל הניקוד ימחק ותוכל להגדיר טורניר חדש.")) {
                localStorage.removeItem('guessingTournamentData');
                localStorage.removeItem('guessingDataVersion');
                tournamentData = {};
                activePlayerId = 'player1';
                showSetupScreen();
            }
        }

        // ── PWA: Service Worker רשום דרך Blob (עובד גם מקובץ מקומי) ──
        if ('serviceWorker' in navigator) {
            const swCode = `
const CACHE = 'guessing-v1';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => { e.waitUntil(clients.claim()); });
self.addEventListener('fetch', e => {
    e.respondWith(
        caches.open(CACHE).then(cache =>
            cache.match(e.request).then(cached => {
                const fresh = fetch(e.request).then(res => {
                    cache.put(e.request, res.clone());
                    return res;
                }).catch(() => cached);
                return cached || fresh;
            })
        )
    );
});
`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl)
